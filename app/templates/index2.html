<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vuetify@4.0.5/dist/vuetify.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
    <style>
        :root {
            --eq-sand: #F5F0E8;
            --eq-dark: #1A1612;
            --eq-mid: #3D3530;
            --eq-accent: #C8A96E;
            --eq-muted: #9A8F84;
            --eq-line: rgba(200, 169, 110, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--eq-sand);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        /* Header */
        .eq-header {
            background-color: var(--eq-dark);
            border-bottom: 1px solid var(--eq-line);
            padding: 0 48px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .eq-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.18em;
            color: var(--eq-sand);
            text-transform: uppercase;
        }

        .eq-logo span {
            color: var(--eq-accent);
        }

        .eq-header-line {
            width: 40px;
            height: 1px;
            background: var(--eq-accent);
            opacity: 0.6;
        }

        /* Main content */
        .eq-main {
            max-width: 780px;
            margin: 0 auto;
            padding: 64px 32px 80px;
        }

        .eq-section-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--eq-muted);
            margin-bottom: 28px;
        }

        /* Input rows */
        .eq-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            animation: fadeSlideIn 0.28s ease both;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .eq-row-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: var(--eq-accent);
            opacity: 0.7;
            min-width: 20px;
            text-align: right;
            user-select: none;
        }

        /* Custom input */
        .eq-input-wrap {
            flex: 1;
            position: relative;
        }

        .eq-input {
            width: 100%;
            background: white;
            border: 1px solid var(--eq-line);
            border-radius: 4px;
            padding: 13px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--eq-dark);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .eq-input::placeholder {
            color: var(--eq-muted);
            font-weight: 300;
        }

        .eq-input:focus {
            border-color: var(--eq-accent);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.12);
        }

        /* Action button next to input */
        .eq-btn-action {
            background: var(--eq-dark) !important;
            color: var(--eq-sand) !important;
            border-radius: 4px !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 13px !important;
            font-weight: 400 !important;
            letter-spacing: 0.04em !important;
            height: 46px !important;
            padding: 0 22px !important;
            border: none !important;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s !important;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .eq-btn-action:hover {
            background: var(--eq-mid) !important;
        }

        /* Remove button */
        .eq-btn-remove {
            background: transparent !important;
            color: var(--eq-muted) !important;
            border: none !important;
            cursor: pointer;
            border-radius: 4px !important;
            width: 32px !important;
            height: 32px !important;
            min-width: unset !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: color 0.18s, background 0.18s !important;
        }

        .eq-btn-remove:hover {
            color: #b55a4a !important;
            background: rgba(181, 90, 74, 0.08) !important;
        }

        /* Divider */
        .eq-divider {
            border: none;
            border-top: 1px solid var(--eq-line);
            margin: 28px 0;
        }

        /* Add button */
        .eq-btn-add {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px dashed rgba(200, 169, 110, 0.5);
            border-radius: 4px;
            padding: 11px 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.06em;
            color: var(--eq-accent);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            text-transform: uppercase;
        }

        .eq-btn-add:hover {
            background: rgba(200, 169, 110, 0.07);
            border-color: var(--eq-accent);
        }

        .eq-btn-add .mdi {
            font-size: 16px;
        }

        /* Count badge */
        .eq-count {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            color: var(--eq-muted);
            letter-spacing: 0.08em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Header -->
    <header class="eq-header">
        <div class="eq-logo">Equ<span>a</span>tor</div>
        <div class="eq-header-line"></div>
    </header>

    <!-- Main -->
    <main class="eq-main">
        <p class="eq-section-label">Entradas · {{ rows.length }}</p>

        <div
            v-for="(row, index) in rows"
            :key="row.id"
            class="eq-row"
        >
            <span class="eq-row-number">{{ String(index + 1).padStart(2, '0') }}</span>

            <div class="eq-input-wrap">
                <input
                    class="eq-input"
                    v-model="row.value"
                    :placeholder="'Digite algo...'"
                    type="text"
                />
            </div>

            <button class="eq-btn-action" @click="handleAction(row, index)">
                Enviar
            </button>

            <button
                v-if="rows.length > 1"
                class="eq-btn-remove"
                @click="removeRow(index)"
                title="Remover"
            >
                <span class="mdi mdi-close" style="font-size:16px;"></span>
            </button>
        </div>

        <hr class="eq-divider">

        <button class="eq-btn-add" @click="addRow">
            <span class="mdi mdi-plus"></span>
            Adicionar entrada
        </button>

        <p class="eq-count" v-if="rows.length > 1">
            {{ rows.length }} entradas no total
        </p>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.5.31/dist/vue.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vuetify@4.0.5/dist/vuetify.min.js"></script>
<script>
    const { createApp, ref } = Vue
    const { createVuetify, blueprints: { md3 } } = Vuetify

    const vuetify = createVuetify({ blueprint: md3 })

    const app = createApp({
        setup() {
            let nextId = 1

            const rows = ref([
                { id: nextId++, value: '' }
            ])

            function addRow() {
                rows.value.push({ id: nextId++, value: '' })
            }

            function removeRow(index) {
                rows.value.splice(index, 1)
            }

            function handleAction(row, index) {
                if (!row.value.trim()) return
                alert(`Entrada ${index + 1}: "${row.value}"`)
            }

            return { rows, addRow, removeRow, handleAction }
        }
    })

    app.use(vuetify).mount('#app')
</script>
</body>
</html>
